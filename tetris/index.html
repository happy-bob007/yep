<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            min-width: 200px;
        }

        .info-box h2 {
            margin-bottom: 10px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-value {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
        }

        .level-value {
            font-size: 28px;
            font-weight: bold;
            color: #4ade80;
        }

        #nextPieceCanvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            display: block;
            margin-top: 10px;
        }

        canvas {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .controls {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
        }

        .controls h3 {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .controls p {
            margin: 8px 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .controls kbd {
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 8px;
            border-radius: 5px;
            font-family: monospace;
            font-weight: bold;
        }

        .volume-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .volume-control span {
            font-size: 18px;
        }

        .volume-slider {
            width: 100px;
            height: 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        #volumePercent {
            font-size: 12px;
            min-width: 35px;
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 1000;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        .pause-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 999;
            backdrop-filter: blur(5px);
        }

        .pause-overlay.show {
            display: block;
        }

        .pause-overlay h2 {
            font-size: 48px;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .pause-overlay p {
            font-size: 18px;
            opacity: 0.8;
        }

        /* --- SECRET MENU STYLES --- */
        .secret-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 1001;
            border: 2px solid #a855f7;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
            min-width: 350px;
            backdrop-filter: blur(10px);
        }

        .secret-menu.show {
            display: block;
        }

        .secret-menu h2 {
            color: #a855f7;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .piece-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .piece-btn {
            background: transparent;
            border: 2px solid;
            padding: 15px 10px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            opacity: 0.3;
            transition: all 0.2s;
            margin-top: 0;
            width: 100%;
        }

        .piece-btn:hover {
            transform: scale(1.05);
        }

        .piece-btn.selected {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .menu-controls {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .menu-controls button {
            font-size: 13px;
            padding: 12px 10px;
            margin-top: 0;
        }
        
        #confirmRigBtn { background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); }
        #resetRigBtn { background: linear-gradient(135deg, #facc15 0%, #eab308 100%); color: #000; }
        #closeRigBtn { background: linear-gradient(135deg, #f87171 0%, #ef4444 100%); }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="left-panel">
            <div class="info-box">
                <h2>Score</h2>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="info-box">
                <h2>Level</h2>
                <div class="level-value" id="level">1</div>
            </div>
            <div class="info-box">
                <h2>Next Piece</h2>
                <canvas id="nextPieceCanvas" width="120" height="120"></canvas>
            </div>
            <div class="controls">
                <h3>Controls</h3>
                <p><kbd>←</kbd> <kbd>→</kbd> Move</p>
                <p><kbd>↓</kbd> Soft Drop</p>
                <p><kbd>↑</kbd> Rotate</p>
                <p><kbd>Space</kbd> Hard Drop</p>
                <p><kbd>P</kbd> Pause</p>
            </div>
            <button id="restartBtn">New Game</button>
        </div>
        <canvas id="gameCanvas" width="300" height="600"></canvas>
    </div>

    <div class="pause-overlay" id="pauseOverlay">
        <h2>PAUSED</h2>
        <p>Press <kbd>P</kbd> to resume</p>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn2">Play Again</button>
    </div>

    <div class="secret-menu" id="secretMenu">
        <h2>Rigging Menu</h2>
        <p style="opacity: 0.8; font-size: 14px;">Select which pieces can spawn:</p>
        <div class="piece-selector" id="pieceSelector">
            <button class="piece-btn selected" data-piece="1" style="border-color: #FF0D72; color: #FF0D72;">I</button>
            <button class="piece-btn selected" data-piece="2" style="border-color: #0DC2FF; color: #0DC2FF;">J</button>
            <button class="piece-btn selected" data-piece="3" style="border-color: #0DFF72; color: #0DFF72;">L</button>
            <button class="piece-btn selected" data-piece="4" style="border-color: #F538FF; color: #F538FF;">O</button>
            <button class="piece-btn selected" data-piece="5" style="border-color: #FF8E0D; color: #FF8E0D;">S</button>
            <button class="piece-btn selected" data-piece="6" style="border-color: #FFE138; color: #FFE138;">T</button>
            <button class="piece-btn selected" data-piece="7" style="border-color: #3877FF; color: #3877FF;">Z</button>
        </div>
        <div class="menu-controls">
            <button id="confirmRigBtn">Confirm</button>
            <button id="resetRigBtn">Reset All</button>
            <button id="closeRigBtn">Cancel</button>
        </div>
    </div>

    <div class="volume-control">
        <span>🔊</span>
        <input type="range" min="0" max="100" value="50" class="volume-slider" id="volumeSlider">
        <span id="volumePercent">50%</span>
    </div>

    <audio id="bgMusic" loop>
        <source src="Tetris Soundtrack.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextPieceCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        const COLORS = [
            null,
            '#FF0D72', // I
            '#0DC2FF', // J
            '#0DFF72', // L
            '#F538FF', // O
            '#FF8E0D', // S
            '#FFE138', // T
            '#3877FF'  // Z
        ];

        const SHAPES = [
            [],
            [[1,1,1,1]], // I
            [[1,0,0],[1,1,1]], // J
            [[0,0,1],[1,1,1]], // L
            [[1,1],[1,1]], // O
            [[0,1,1],[1,1,0]], // S
            [[0,1,0],[1,1,1]], // T
            [[1,1,0],[0,1,1]]  // Z
        ];

        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameOver = false;
        let paused = false;
        let secretMenuOpen = false; // Tracks if the secret menu is currently open
        let currentPiece = null;
        let nextPiece = null;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        
        // This array dictates which pieces are allowed to spawn
        let allowedPieces = [1, 2, 3, 4, 5, 6, 7];

        class Piece {
            constructor(type) {
                this.type = type;
                this.shape = SHAPES[type];
                this.color = COLORS[type];
                this.x = Math.floor(COLS / 2) - Math.floor(this.shape[0].length / 2);
                this.y = 0;
            }

            rotate() {
                const newShape = this.shape[0].map((_, i) =>
                    this.shape.map(row => row[i]).reverse()
                );
                const previousShape = this.shape;
                this.shape = newShape;
                
                if (this.collides()) {
                    this.shape = previousShape;
                }
            }

            collides() {
                for (let y = 0; y < this.shape.length; y++) {
                    for (let x = 0; x < this.shape[y].length; x++) {
                        if (this.shape[y][x]) {
                            const newX = this.x + x;
                            const newY = this.y + y;
                            
                            if (newX < 0 || newX >= COLS || newY >= ROWS) {
                                return true;
                            }
                            
                            if (newY >= 0 && board[newY][newX]) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            merge() {
                for (let y = 0; y < this.shape.length; y++) {
                    for (let x = 0; x < this.shape[y].length; x++) {
                        if (this.shape[y][x]) {
                            board[this.y + y][this.x + x] = this.type;
                        }
                    }
                }
            }
        }

        // Updated to use the allowedPieces array instead of hardcoded 1-7
        function randomPiece() {
            const index = Math.floor(Math.random() * allowedPieces.length);
            return new Piece(allowedPieces[index]);
        }

        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            
            // Add gradient for 3D effect
            const gradient = ctx.createLinearGradient(
                x * BLOCK_SIZE, y * BLOCK_SIZE,
                (x + 1) * BLOCK_SIZE, (y + 1) * BLOCK_SIZE
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
            ctx.fillStyle = gradient;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }

        function drawBoard() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(ctx, x, y, COLORS[board[y][x]]);
                    }
                }
            }
        }

        function getGhostPosition() {
            if (!currentPiece) return null;
            
            let ghostY = currentPiece.y;
            currentPiece.y++;
            
            while (!currentPiece.collides()) {
                ghostY++;
                currentPiece.y++;
            }
            
            currentPiece.y = ghostY;
            return ghostY;
        }

        function drawGhostPiece() {
            if (!currentPiece) return;
            
            const originalY = currentPiece.y;
            const ghostY = getGhostPosition();
            
            if (ghostY === null || ghostY === originalY) {
                currentPiece.y = originalY;
                return;
            }
            
            // Draw ghost piece with transparency
            ctx.globalAlpha = 0.3;
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        ctx.fillStyle = currentPiece.color;
                        ctx.fillRect(
                            (currentPiece.x + x) * BLOCK_SIZE,
                            (ghostY + y) * BLOCK_SIZE,
                            BLOCK_SIZE,
                            BLOCK_SIZE
                        );
                        ctx.strokeStyle = currentPiece.color;
                        ctx.lineWidth = 2;
                        ctx.strokeRect(
                            (currentPiece.x + x) * BLOCK_SIZE,
                            (ghostY + y) * BLOCK_SIZE,
                            BLOCK_SIZE,
                            BLOCK_SIZE
                        );
                    }
                }
            }
            ctx.globalAlpha = 1.0;
            
            currentPiece.y = originalY;
        }

        function drawPiece() {
            if (!currentPiece) return;
            
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        drawBlock(ctx, currentPiece.x + x, currentPiece.y + y, currentPiece.color);
                    }
                }
            }
        }

        function drawNextPiece() {
            nextCtx.fillStyle = '#1a1a2e';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (!nextPiece) return;
            
            const blockSize = 25;
            const offsetX = (nextCanvas.width - nextPiece.shape[0].length * blockSize) / 2;
            const offsetY = (nextCanvas.height - nextPiece.shape.length * blockSize) / 2;
            
            for (let y = 0; y < nextPiece.shape.length; y++) {
                for (let x = 0; x < nextPiece.shape[y].length; x++) {
                    if (nextPiece.shape[y][x]) {
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.fillRect(
                            offsetX + x * blockSize,
                            offsetY + y * blockSize,
                            blockSize,
                            blockSize
                        );
                        nextCtx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                        nextCtx.strokeRect(
                            offsetX + x * blockSize,
                            offsetY + y * blockSize,
                            blockSize,
                            blockSize
                        );
                    }
                }
            }
        }

        function moveDown() {
            currentPiece.y++;
            if (currentPiece.collides()) {
                currentPiece.y--;
                currentPiece.merge();
                clearLines();
                spawnPiece();
                return false;
            }
            return true;
        }

        function moveLeft() {
            currentPiece.x--;
            if (currentPiece.collides()) {
                currentPiece.x++;
            }
        }

        function moveRight() {
            currentPiece.x++;
            if (currentPiece.collides()) {
                currentPiece.x--;
            }
        }

        function hardDrop() {
            while (moveDown()) {}
        }

        function clearLines() {
            let linesCleared = 0;
            
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    y++;
                }
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += [0, 100, 300, 500, 800][linesCleared] * level;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                updateScore();
            }
        }

        function spawnPiece() {
            currentPiece = nextPiece || randomPiece();
            nextPiece = randomPiece();
            
            if (currentPiece.collides()) {
                endGame();
            }
            
            drawNextPiece();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }

        function endGame() {
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        function resetGame() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            level = 1;
            lines = 0;
            gameOver = false;
            paused = false;
            secretMenuOpen = false;
            dropCounter = 0;
            dropInterval = 1000;
            currentPiece = null;
            nextPiece = null;
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('secretMenu').classList.remove('show');
            updateScore();
            spawnPiece();
        }

        function gameLoop(time = 0) {
            // Keep game paused if regular pause OR secret menu is open
            if (!gameOver && !paused && !secretMenuOpen) {
                const deltaTime = time - lastTime;
                lastTime = time;
                dropCounter += deltaTime;
                
                if (dropCounter > dropInterval) {
                    moveDown();
                    dropCounter = 0;
                }
                
                drawBoard();
                drawGhostPiece();
                drawPiece();
            } else if (paused || secretMenuOpen) {
                // Keep tracking lastTime to avoid huge jumps when unpausing
                lastTime = time;
            }
            
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            // Secret Menu Trigger
            if (e.key === 'c' || e.key === 'C') {
                if (!gameOver) {
                    secretMenuOpen = !secretMenuOpen;
                    const menuEl = document.getElementById('secretMenu');
                    
                    if (secretMenuOpen) {
                        bgMusic.pause();
                        menuEl.classList.add('show');
                        document.getElementById('pauseOverlay').classList.remove('show');
                        paused = true; // Auto-pause while menu is open
                    } else {
                        closeSecretMenu();
                    }
                }
                return;
            }

            if (e.key === 'p' || e.key === 'P') {
                if (!gameOver && !secretMenuOpen) {
                    paused = !paused;
                    if (paused) {
                        bgMusic.pause();
                        pauseOverlay.classList.add('show');
                    } else {
                        bgMusic.play().catch(err => console.log('Audio play failed:', err));
                        pauseOverlay.classList.remove('show');
                    }
                }
                return;
            }

            // Block movement keys if paused or secret menu is open
            if (gameOver || paused || secretMenuOpen) {
                return;
            }
            
            switch(e.key) {
                case 'ArrowLeft':
                    moveLeft();
                    break;
                case 'ArrowRight':
                    moveRight();
                    break;
                case 'ArrowDown':
                    moveDown();
                    dropCounter = 0;
                    break;
                case 'ArrowUp':
                    currentPiece.rotate();
                    break;
                case ' ':
                    e.preventDefault();
                    hardDrop();
                    break;
            }
            
            drawBoard();
            drawGhostPiece();
            drawPiece();
        });

        document.getElementById('restartBtn').addEventListener('click', resetGame);
        document.getElementById('restartBtn2').addEventListener('click', resetGame);

        // --- Secret Menu Logic ---
        const pieceBtns = document.querySelectorAll('.piece-btn');
        const secretMenu = document.getElementById('secretMenu');

        // Toggle piece selection in the menu
        pieceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.toggle('selected');
            });
        });

        function closeSecretMenu() {
            secretMenu.classList.remove('show');
            secretMenuOpen = false;
            
            // If regular pause was inactive, resume game and music
            if (!document.getElementById('pauseOverlay').classList.contains('show')) {
                paused = false;
                bgMusic.play().catch(e => console.log('Audio play failed:', e));
            }

            // Sync UI back to the true allowedPieces list (in case they closed without saving)
            pieceBtns.forEach(b => {
                const pieceVal = parseInt(b.dataset.piece);
                if (allowedPieces.includes(pieceVal)) {
                    b.classList.add('selected');
                } else {
                    b.classList.remove('selected');
                }
            });
        }

        // Apply new rigged piece list
        document.getElementById('confirmRigBtn').addEventListener('click', () => {
            const selected = Array.from(pieceBtns)
                .filter(b => b.classList.contains('selected'))
                .map(b => parseInt(b.dataset.piece));
            
            if (selected.length === 0) {
                alert("You must select at least one piece!");
                return;
            }
            
            allowedPieces = selected;
            
            // Instantly update the next piece to reflect new rules
            nextPiece = randomPiece(); 
            drawNextPiece();
            
            closeSecretMenu();
        });

        // Reset to normal piece selection
        document.getElementById('resetRigBtn').addEventListener('click', () => {
            allowedPieces = [1, 2, 3, 4, 5, 6, 7];
            pieceBtns.forEach(b => b.classList.add('selected'));
            nextPiece = randomPiece();
            drawNextPiece();
        });

        // Cancel and close
        document.getElementById('closeRigBtn').addEventListener('click', closeSecretMenu);

        // Audio controls
        const bgMusic = document.getElementById('bgMusic');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumePercent = document.getElementById('volumePercent');
        const pauseOverlay = document.getElementById('pauseOverlay');

        // Load saved volume or use default
        const savedVolume = localStorage.getItem('tetrisVolume') || 50;
        volumeSlider.value = savedVolume;
        bgMusic.volume = savedVolume / 100;
        volumePercent.textContent = savedVolume + '%';

        volumeSlider.addEventListener('input', (e) => {
            const volume = e.target.value / 100;
            bgMusic.volume = volume;
            volumePercent.textContent = e.target.value + '%';
            localStorage.setItem('tetrisVolume', e.target.value);
        });

        // Start music when user interacts with the page
        document.addEventListener('keydown', () => {
            // Don't auto-play if they triggered secret menu or pause immediately
            if (bgMusic.paused && !paused && !secretMenuOpen) {
                bgMusic.play().catch(e => console.log('Audio play failed:', e));
            }
        }, { once: true });

        document.addEventListener('click', () => {
            if (bgMusic.paused && !paused && !secretMenuOpen) {
                bgMusic.play().catch(e => console.log('Audio play failed:', e));
            }
        }, { once: true });

        resetGame();
        gameLoop();
    </script>
</body>
</html>
